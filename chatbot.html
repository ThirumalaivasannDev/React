<!doctype html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body
      {
        font-family:Arial;
        margin-top:0;
        margin-bottom:0;
      }
      .send-button
      {
        background:rgb(25, 135, 84);
        color:white;
        padding:12px 20px;
        margin-left:15px;
        border:none;
        border-radius:10px;
        font-size:15px;
        cursor:pointer;
      }
      .chat-input
      {
        padding:10px 20px;
        font-size:15px;
        border-radius:10px;
        border-width:1px;
        font-size:15px;
        flex-grow:1;
      }
      .chat-input-container
      {
        display:flex;
        flex-direction:row;
        justify-content: center;
        margin-bottom:60px;
      }
      .app-container
      {
        max-width:600px;
        margin-left:auto;
        margin-right:auto;
        height:100vh;
        display:flex;
        flex-direction:column;
      }
      .chat-message-user
      {
        display:flex;
        justify-content:end; 
        align-items:center;
        margin-bottom:20px;
      }
      .chat-message-robot
      {
        display:flex;
        justify-content:start;     
        align-items:center; 
        margin-bottom:20px;
      }
      .chat-message-text
      {
        background:rgb(238, 238, 238);
        padding:12px;
        padding:15px 20px;
        border-radius:10px;
        margin-right:10px;
        margin-left:10px;
        max-width:300px;
      }
      .chat-message-image
      {
        width:45px;
      }
      .chat-message-container
      {
        flex-grow:1;
        margin-top:20px;
        overflow:scroll;
        scrollbar-width:none;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({ chatMessage, setChatMessage }) {
        const [inputText, setInputText] = React.useState('');
        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {

          const newChatMessage=[
            ...chatMessage,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ];
          

          const response = Chatbot.getResponse(inputText);

          setChatMessage([
            ...newChatMessage,  
            {
              message: response,
              sender: "robot",
              id: crypto.randomUUID(),
            },
          ]);

          
          setInputText("");
        }
        return (
          <div className='chat-input-container'>
            <input
              placeholder="Send a message to Chatbot"
              size="30"
              onChange={saveInputText}
              value={inputText}
              className="chat-input"
            />
            <button className="send-button" onClick={sendMessage}>Send</button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        return (
          <div className={
            sender === 'user' 
            ? 'chat-message-user'
             : 'chat-message-robot'
            }>
            {sender === "robot" && <img src="robot.png" className='chat-message-image' />}

            <div className="chat-message-text">
              {message}
            </div>

            {sender === "user" && <img src="user.png" 
            className='chat-message-image'  />}
          </div>
        );
      }

      function ChatMessages({ chatMessage }) {

        const chatMessageRef=React.useRef(null);
        React.useEffect(()=>
      {
        const containerEle=chatMessageRef.current;

        if(containerEle)
      {
        containerEle.scrollTop=containerEle.scrollHeight;
      }
        console.log("Updated");
      },[chatMessage]);
        return (
          <div class='chat-message-container' ref={chatMessageRef}>
            {chatMessage.map((chatmessage) => {
              return (
                <ChatMessage
                  message={chatmessage.message}
                  sender={chatmessage.sender}
                  key={chatmessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessage, setChatMessage] = React.useState([
          {
            message: "Hello Chatbot",
            sender: "user",
            id: "id1",
          },
          {
            message: "Hello! How can I help you?",
            sender: "robot",
            id: "id2",
          },
          {
            message: "Please Provide the todays Date",
            sender: "user",
            id: "id3",
          },
          {
            message: "Today is February 20",
            sender: "robot",
            id: "id4",
          },
        ]);

        return (
          <div className='app-container'>
  
            <ChatMessages chatMessage={chatMessage} />

            <ChatInput
              chatMessage={chatMessage}
              setChatMessage={setChatMessage}
            />

          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
